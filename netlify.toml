[build]
  command = "npm run build"
  publish = "out"
  environment = { NODE_VERSION = "20" }

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  # Keep the headless-chromium binary external — Netlify ships it as a layer
  # rather than bundling 50+MB into every function invocation.
  external_node_modules = ["@sparticuz/chromium", "playwright-core"]

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production]
  environment = { NODE_VERSION = "20" }

[context.deploy-preview]
  environment = { NODE_VERSION = "20" }
